<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPRICOM — {{TITULO}}</title>
<style>
  :root {
    --primary: #1A1A2E;
    --primary-light: #2D2D4A;
    --accent: #CC7A00;
    --accent-hover: #E68A00;
    --text: #1A1A2E;
    --text-light: #666;
    --bg: #F5F5F8;
    --white: #FFFFFF;
    --success: #00CC88;
    --border: #E0E0E8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.6;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    background: var(--primary); color: white;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  nav .brand { font-weight: 700; font-size: 18px; }
  nav .brand span { color: var(--accent); }
  nav .menu-toggle {
    background: none; border: none; color: white; font-size: 24px; cursor: pointer;
    display: none; padding: 4px;
  }
  nav ul { display: flex; list-style: none; gap: 4px; }
  nav ul li a {
    color: rgba(255,255,255,.75); text-decoration: none;
    padding: 8px 12px; border-radius: 6px; font-size: 13px;
    transition: all .2s;
  }
  nav ul li a:hover, nav ul li a.active {
    color: white; background: rgba(255,255,255,.1);
  }

  /* HERO */
  .hero {
    margin-top: 56px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white; text-align: center; padding: 80px 24px 60px;
  }
  .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 8px; }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 20px; opacity: .85; max-width: 600px; margin: 0 auto; }
  .hero .meta {
    margin-top: 32px; display: flex; justify-content: center; gap: 32px;
    font-size: 14px; opacity: .7;
  }
  .hero .badge {
    display: inline-block; background: var(--accent); color: white;
    padding: 4px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
    margin-bottom: 16px;
  }

  /* MAIN */
  .main-wrapper { display: flex; max-width: 1200px; margin: 0 auto; }
  main { flex: 1; padding: 40px 32px 80px; max-width: 860px; margin: 0 auto; }

  /* SECTIONS */
  section {
    background: var(--white); border-radius: 12px; padding: 32px;
    margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  section h2 {
    font-size: 26px; color: var(--primary);
    margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 3px solid var(--accent);
  }
  section h3 { font-size: 18px; color: var(--primary); margin-top: 24px; margin-bottom: 12px; }
  section h4 {
    font-size: 15px; color: var(--accent); margin-top: 20px; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  section p { margin-bottom: 12px; color: #333; }
  section ul, section ol { margin: 8px 0 16px 24px; }
  section li { margin-bottom: 6px; color: #333; }
  section li strong { color: var(--primary); }

  /* TABLES */
  table {
    width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px;
  }
  th {
    background: var(--primary); color: white; padding: 10px 12px;
    text-align: left; font-weight: 600;
  }
  td {
    padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top;
  }
  tr:nth-child(even) td { background: #FAFAFC; }

  /* KPI GRID */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px; margin: 16px 0;
  }
  .kpi-card {
    background: var(--bg); border-radius: 10px; padding: 20px; text-align: center;
    border: 1px solid var(--border);
    transition: transform .15s, box-shadow .15s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .kpi-card .num { font-size: 32px; font-weight: 800; color: var(--accent); }
  .kpi-card .label { font-size: 12px; color: var(--text-light); margin-top: 4px; }
  .kpi-card .desc { font-size: 12px; color: #888; margin-top: 8px; }

  /* ROLE GRID */
  .role-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px; margin: 16px 0;
  }
  .role-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
    border-top: 4px solid var(--accent);
    transition: transform .15s;
  }
  .role-card:hover { transform: translateY(-2px); }
  .role-card h4 { margin-top: 0; text-transform: none; letter-spacing: 0; font-size: 16px; }
  .role-card .who { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
  .role-card ul { margin: 8px 0 0 16px; }
  .role-card li { font-size: 13px; margin-bottom: 4px; }

  /* FLOW STEPS */
  .flow-steps { display: flex; flex-direction: column; gap: 0; margin: 16px 0; }
  .flow-step {
    display: flex; gap: 16px; padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .flow-step:last-child { border-bottom: none; }
  .flow-step .step-num {
    width: 32px; height: 32px; min-width: 32px;
    background: var(--accent); color: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .flow-step .step-body { flex: 1; }
  .flow-step .step-body strong { display: block; font-size: 14px; color: var(--primary); }
  .flow-step .step-body span { font-size: 13px; color: var(--text-light); }

  /* HIGHLIGHT BOXES */
  .highlight-box {
    background: #FFF8F0; border-left: 4px solid var(--accent);
    padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 16px 0;
  }
  .highlight-box strong { color: var(--accent); }
  .success-box {
    background: #F0FFF8; border-left: 4px solid var(--success);
    padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 16px 0;
  }
  .danger-box {
    background: #FFF0F0; border-left: 4px solid #E04040;
    padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 16px 0;
  }
  .info-box {
    background: #F0F5FF; border-left: 4px solid #4080E0;
    padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 16px 0;
  }

  /* VS GRID (comparaciones) */
  .vs-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0;
  }
  .vs-col {
    padding: 20px; border: 1px solid var(--border); border-radius: 10px;
  }
  .vs-col h4 { text-align: center; margin-top: 0; text-transform: none; font-size: 16px; }

  /* FEATURE LIST */
  .feature-list { list-style: none; margin: 16px 0 !important; }
  .feature-list li {
    padding: 4px 0 4px 28px; position: relative; font-size: 14px;
  }
  .feature-list li::before {
    content: "✓"; color: var(--success); font-weight: 700;
    position: absolute; left: 0;
  }
  .feature-list.danger li::before { content: "✗"; color: #E04040; }

  /* TIMELINE */
  .timeline { position: relative; margin: 24px 0; padding-left: 32px; }
  .timeline::before {
    content: ""; position: absolute; left: 11px; top: 0; bottom: 0;
    width: 2px; background: var(--border);
  }
  .timeline-item { position: relative; margin-bottom: 24px; }
  .timeline-item::before {
    content: ""; position: absolute; left: -24px; top: 6px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--white);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .timeline-item h4 { margin: 0 0 4px; }
  .timeline-item p { margin: 0; font-size: 13px; color: var(--text-light); }
  .timeline-item .date {
    font-size: 11px; color: var(--accent); font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
  }

  /* TWO COLUMN LAYOUT */
  .two-col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 16px 0;
  }
  @media (max-width: 768px) {
    .two-col { grid-template-columns: 1fr; }
    .vs-grid { grid-template-columns: 1fr; }
  }

  /* PRINT */
  @media print {
    nav, .menu-toggle { display: none !important; }
    .hero { margin-top: 0; padding: 40px 24px; }
    section { break-inside: avoid; box-shadow: none; border: 1px solid var(--border); }
    .kpi-card:hover, .role-card:hover { transform: none; }
  }

  /* FOOTER */
  footer {
    background: var(--primary); color: rgba(255,255,255,.6);
    text-align: center; padding: 32px 24px; font-size: 13px;
  }
  footer strong { color: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav ul { display: none; }
    nav .menu-toggle { display: block; }
    nav ul.open {
      display: flex; flex-direction: column; position: absolute;
      top: 56px; left: 0; width: 100%; background: var(--primary);
      padding: 8px 16px 16px;
    }
    .hero h1 { font-size: 32px; }
    .hero p { font-size: 16px; }
    .hero .meta { flex-direction: column; gap: 8px; }
    main { padding: 20px 16px 60px; }
    section { padding: 20px; }
    table { font-size: 12px; }
    .role-grid { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="brand">SUPRICOM <span>· {{TITULO_CORTO}}</span></div>
  <button class="menu-toggle" onclick="document.querySelector('nav ul').classList.toggle('open')">☰</button>
  <ul>
    {{NAV_LINKS}}
  </ul>
</nav>

<!-- HERO (opcional — borrar si no aplica) -->
<div class="hero">
  <div class="badge">{{BADGE}}</div>
  <h1>{{TITULO}} <span>{{TITULO_ACCENT}}</span></h1>
  <p>{{SUBTITULO}}</p>
  <div class="meta">
    <span>{{META_1}}</span>
    <span>{{META_2}}</span>
    <span>{{META_3}}</span>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrapper">
<main>
  {{CONTENIDO}}
</main>
</div>

<footer>
  <p><strong>SUPRICOM</strong> · Tu mayorista de confianza</p>
  <p>{{FOOTER_TEXTO}}</p>
</footer>

<script>
const sections = document.querySelectorAll('section[id]');
const navLinks = document.querySelectorAll('nav ul li a');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      navLinks.forEach(a => a.classList.remove('active'));
      const link = document.querySelector(`nav ul li a[href="#${entry.target.id}"]`);
      if (link) link.classList.add('active');
    }
  });
}, { threshold: .3 });
sections.forEach(s => observer.observe(s));
</script>

</body>
</html>
